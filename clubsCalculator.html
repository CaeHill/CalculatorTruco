<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/calculatorTrucoStyle.css">
    <title>clubsCalculator</title>
</head>
<body>
    <div id="container">
        <img src="img/tableCalculator.png" alt="" id="tableImg">
        <div id="table">
            <div class="gridTable" id="multiplication">
                <button id="btnMultiplication1" class="cardTable"></button>
                <button id="btnMultiplication2" class="cardTable"></button>
                <button id="btnMultiplication3" class="cardTable"></button>
                <button id="btnMultiplication4" class="cardTable"></button>
                <button id="btnMultiplication" class="operatorTable"></button>
                <button id="btnMultiplication5" class="cardTable"></button>
                <button id="btnMultiplication6" class="cardTable"></button>
                <button id="btnMultiplication7" class="cardTable"></button>
                <button id="btnMultiplication8" class="cardTable"></button>
            </div>

            <div class="gridTable" id="division">
                <button id="btnDivision1" class="cardTable"></button>
                <button id="btnDivision2" class="cardTable"></button>
                <button id="btnDivision3" class="cardTable"></button>
                <button id="btnDivision4" class="cardTable"></button>
                <button id="btnDivision" class="operatorTable"></button>
                <button id="btnDivision5" class="cardTable"></button>
                <button id="btnDivision6" class="cardTable"></button>
                <button id="btnDivision7" class="cardTable"></button>
                <button id="btnDivision8" class="cardTable"></button>
            </div>

            <div class="gridTable" id="summation">
                <button id="btnSummation1" class="cardTable"></button>
                <button id="btnSummation2" class="cardTable"></button>
                <button id="btnSummation3" class="cardTable"></button>
                <button id="btnSummation4" class="cardTable"></button>
                <button id="btnSummation" class="operatorTable"></button>
                <button id="btnSummation5" class="cardTable"></button>
                <button id="btnSummation6" class="cardTable"></button>
                <button id="btnSummation7" class="cardTable"></button>
                <button id="btnSummation8" class="cardTable"></button>
            </div>

            <div class="gridTable" id="subtraction">
                <button id="btnSubtraction1" class="cardTable"></button>
                <button id="btnSubtraction2" class="cardTable"></button>
                <button id="btnSubtraction3" class="cardTable"></button>
                <button id="btnSubtraction4" class="cardTable"></button>
                <button id="btnSubtraction" class="operatorTable"></button>
                <button id="btnSubtraction5" class="cardTable"></button>
                <button id="btnSubtraction6" class="cardTable"></button>
                <button id="btnSubtraction7" class="cardTable"></button>
                <button id="btnSubtraction8" class="cardTable"></button>
            </div>

            <div class="gridTable" id="result">
                <button id="btnResult1" class="cardTable"></button>
                <button id="btnResult2" class="cardTable"></button>
                <button id="btnResult3" class="cardTable"></button>
                <button id="btnResult4" class="cardTable"></button>
                <button id="btnResult5" class="cardTable"></button>
                <button id="btnResult6" class="cardTable"></button>
                <button id="btnResult7" class="cardTable"></button>
                <button id="btnResult8" class="cardTable"></button>
            </div>
            
        </div>

        <div id="hand">
            <button id="btn0" class="btnHand" alt="0"><img src="img/clubs/clubs0.png" class="cardHandImg"></button>
            <button id="btn1" class="btnHand" alt="1"><img src="img/clubs/clubs1.png" class="cardHandImg"></button>
            <button id="btn2" class="btnHand" alt="2"><img src="img/clubs/clubs2.png" class="cardHandImg"></button>
            <button id="btn3" class="btnHand" alt="3"><img src="img/clubs/clubs3.png" class="cardHandImg"></button>
            <button id="btn4" class="btnHand" alt="4"><img src="img/clubs/clubs4.png" class="cardHandImg"></button>
            <button id="btn5" class="btnHand" alt="5"><img src="img/clubs/clubs5.png" class="cardHandImg"></button>
            <button id="btn6" class="btnHand" alt="6"><img src="img/clubs/clubs6.png" class="cardHandImg"></button>
            <button id="btn7" class="btnHand" alt="7"><img src="img/clubs/clubs7.png" class="cardHandImg"></button>
            <button id="btn8" class="btnHand" alt="8"><img src="img/clubs/clubs8.png" class="cardHandImg"></button>
            <button id="btn9" class="btnHand" alt="9"><img src="img/clubs/clubs9.png" class="cardHandImg"></button>
        </div>
    </div>
</body>
    <script src="./js/script.js"></script>
</html>
