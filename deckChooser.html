<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/deckChooserStyle.css">
    <title>deckChooser</title>
</head>
<body>
    <div id="container">
        <img src="img/tableDecks.png" alt="" id="tableImg">

        <div id="table">
            <div class="gridTable" id="deckChooser">
                <a href="calculator.html" id="btnSwordsDeck" class="btnDeckChooser">
                    <img src="img/decks/swords.png" class="deckImg">
                </a>

                <a href="calculator.html" id="btnClubsDeck" class="btnDeckChooser">
                    <img src="img/decks/clubs.png" class="deckImg">
                </a>

                <a href="calculator.html" id="btnCoinsDeck" class="btnDeckChooser">
                    <img src="img/decks/coins.png" class="deckImg">
                </a>

                <a href="calculator.html" id="btnCupsDeck" class="btnDeckChooser">
                    <img src="img/decks/cups.png" class="deckImg">
                </a>
            </div>
        </div>
    </div>
    
    <script src="./js/app.js"></script>
</body>
</html>
