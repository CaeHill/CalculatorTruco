<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/deckChooserStyle.css">
    <title>deckChooser</title>
</head>
<body>
    <div id="container">
        <img src="img/tableDecks.png" alt="" id="tableImg">
        <div id="table">
            <div class="gridTable" id="deckChooser">
                <button id="btnSwordsDeck" class="btnDeckChooser" alt="Mão 1"><a href="swordsCalculator.html"><img src="img/decks/swordsDeck.png" class="deckImg"></a></button>
                <button id="btnClubsDeck" class="btnDeckChooser" alt="Mão 2"><a href="clubsCalculator.html"><img src="img/decks/clubsDeck.png" class="deckImg"></a></button>
                <button id="btnCoinsDeck" class="btnDeckChooser" alt="Mão 3"><a href="coinsCalculator.html"><img src="img/decks/coinsDeck.png" class="deckImg"></a></button>
                <button id="btnCupsDeck" class="btnDeckChooser" alt="Mão 4"><a href="cupsCalculator.html"><img src="img/decks/cupsDeck.png" class="deckImg"></a></button>
            </div>
        </div>
    </div>
    <script src="./js/app.js"></script>
</body>
</html>
