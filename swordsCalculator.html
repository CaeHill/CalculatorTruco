<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/calculatorTrucoStyle.css">
    <title>swordsCalculator</title>
</head>
<body>
    <div id="container">
        <img src="img/tableCalculator.png" alt="" id="tableImg">
        <div id="table">
            <div class="gridTable" id="multiplication">
                <div id="multiplication1" class="cardTable"></div>
                <div id="multiplication2" class="cardTable"></div>
                <div id="multiplication3" class="cardTable"></div>
                <div id="multiplication4" class="cardTable"></div>
                <div id="multiplicationOperator" class="operatorTable"></div>
                <div id="multiplication5" class="cardTable"></div>
                <div id="multiplication6" class="cardTable"></div>
                <div id="multiplication7" class="cardTable"></div>
                <div id="multiplication8" class="cardTable"></div>
            </div>

            <div class="gridTable" id="division">
                <div id="division1" class="cardTable"></div>
                <div id="division2" class="cardTable"></div>
                <div id="division3" class="cardTable"></div>
                <div id="division4" class="cardTable"></div>
                <div id="divisionOperator" class="operatorTable"></div>
                <div id="division5" class="cardTable"></div>
                <div id="division6" class="cardTable"></div>
                <div id="division7" class="cardTable"></div>
                <div id="division8" class="cardTable"></div>
            </div>

            <div class="gridTable" id="summation">
                <div id="summation1" class="cardTable"></div>
                <div id="summation2" class="cardTable"></div>
                <div id="summation3" class="cardTable"></div>
                <div id="summation4" class="cardTable"></div>
                <div id="summationOperator" class="operatorTable"></div>
                <div id="summation5" class="cardTable"></div>
                <div id="summation6" class="cardTable"></div>
                <div id="summation7" class="cardTable"></div>
                <div id="summation8" class="cardTable"></div>
            </div>

            <div class="gridTable" id="subtraction">
                <div id="subtraction1" class="cardTable"></div>
                <div id="subtraction2" class="cardTable"></div>
                <div id="subtraction3" class="cardTable"></div>
                <div id="subtraction4" class="cardTable"></div>
                <div id="subtractionOperator" class="operatorTable"></div>
                <div id="subtraction5" class="cardTable"></div>
                <div id="subtraction6" class="cardTable"></div>
                <div id="subtraction7" class="cardTable"></div>
                <div id="subtraction8" class="cardTable"></div>
            </div>

            <div class="gridTable" id="result">
                <div id="result1" class="resultTable"></div>
                <div id="result2" class="resultTable"></div>
                <div id="result3" class="resultTable"></div>
                <div id="result4" class="resultTable"></div>
                <div id="result5" class="resultTable"></div>
                <div id="result6" class="resultTable"></div>
                <div id="result7" class="resultTable"></div>
                <div id="result8" class="resultTable"></div>
            </div>
            
        </div>

        <div id="hand">
            <div id="0" class="cardHand"><img src="img/swords/swords0.png" class="cardHandImg"></div>
            <div id="1" class="cardHand"><img src="img/swords/swords1.png" class="cardHandImg"></div>
            <div id="2" class="cardHand"><img src="img/swords/swords2.png" class="cardHandImg"></div>
            <div id="3" class="cardHand"><img src="img/swords/swords3.png" class="cardHandImg"></div>
            <div id="4" class="cardHand"><img src="img/swords/swords4.png" class="cardHandImg"></div>
            <div id="5" class="cardHand"><img src="img/swords/swords5.png" class="cardHandImg"></div>
            <div id="6" class="cardHand"><img src="img/swords/swords6.png" class="cardHandImg"></div>
            <div id="7" class="cardHand"><img src="img/swords/swords7.png" class="cardHandImg"></div>
            <div id="8" class="cardHand"><img src="img/swords/swords8.png" class="cardHandImg"></div>
            <div id="9" class="cardHand"><img src="img/swords/swords9.png" class="cardHandImg"></div>
        </div>
    </div>
    <script src="./js/app.js"></script>
</body>
</html>
