<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/calculatorTrucoStyle.css">
    <title>coinsCalculator</title>
</head>
<body>
    <div id="container">
        <img src="img/tableCalculator.png" alt="" id="tableImg">
        <div id="table">
            <div class="gridTable" id="multiplication">
                <button id="multiplication1" class="cardTable"></button>
                <button id="multiplication2" class="cardTable"></button>
                <button id="multiplication3" class="cardTable"></button>
                <button id="multiplication4" class="cardTable"></button>
                <button id="*" class="operatorTable"></button>
                <button id="multiplication5" class="cardTable"></button>
                <button id="multiplication6" class="cardTable"></button>
                <button id="multiplication7" class="cardTable"></button>
                <button id="multiplication8" class="cardTable"></button>
            </div>

            <div class="gridTable" id="division">
                <button id="division1" class="cardTable"></button>
                <button id="division2" class="cardTable"></button>
                <button id="division3" class="cardTable"></button>
                <button id="division4" class="cardTable"></button>
                <button id="/" class="operatorTable"></button>
                <button id="division5" class="cardTable"></button>
                <button id="division6" class="cardTable"></button>
                <button id="division7" class="cardTable"></button>
                <button id="division8" class="cardTable"></button>
            </div>

            <div class="gridTable" id="summation">
                <button id="summation1" class="cardTable"></button>
                <button id="summation2" class="cardTable"></button>
                <button id="summation3" class="cardTable"></button>
                <button id="summation4" class="cardTable"></button>
                <button id="+" class="operatorTable"></button>
                <button id="summation5" class="cardTable"></button>
                <button id="summation6" class="cardTable"></button>
                <button id="summation7" class="cardTable"></button>
                <button id="summation8" class="cardTable"></button>
            </div>

            <div class="gridTable" id="subtraction">
                <button id="subtraction1" class="cardTable"></button>
                <button id="subtraction2" class="cardTable"></button>
                <button id="subtraction3" class="cardTable"></button>
                <button id="subtraction4" class="cardTable"></button>
                <button id="-" class="operatorTable"></button>
                <button id="subtraction5" class="cardTable"></button>
                <button id="subtraction6" class="cardTable"></button>
                <button id="subtraction7" class="cardTable"></button>
                <button id="subtraction8" class="cardTable"></button>
            </div>

            <div class="gridTable" id="result">
                <div id="result7" class="resultTable"></div>
                <div id="result6" class="resultTable"></div>
                <div id="result5" class="resultTable"></div>
                <div id="result4" class="resultTable"></div>
                <div id="result3" class="resultTable"></div>
                <div id="result2" class="resultTable"></div>
                <div id="result1" class="resultTable"></div>
                <div id="result0" class="resultTable"></div>
            </div>
            
        </div>

        <div id="hand">
            <div id="0" class="cardHand"><img src="img/coins/0.png" class="cardHandImg"></div>
            <div id="1" class="cardHand"><img src="img/coins/1.png" class="cardHandImg"></div>
            <div id="2" class="cardHand"><img src="img/coins/2.png" class="cardHandImg"></div>
            <div id="3" class="cardHand"><img src="img/coins/3.png" class="cardHandImg"></div>
            <div id="4" class="cardHand"><img src="img/coins/4.png" class="cardHandImg"></div>
            <div id="5" class="cardHand"><img src="img/coins/5.png" class="cardHandImg"></div>
            <div id="6" class="cardHand"><img src="img/coins/6.png" class="cardHandImg"></div>
            <div id="7" class="cardHand"><img src="img/coins/7.png" class="cardHandImg"></div>
            <div id="8" class="cardHand"><img src="img/coins/8.png" class="cardHandImg"></div>
            <div id="9" class="cardHand"><img src="img/coins/9.png" class="cardHandImg"></div>
        </div>
    </div>
    <script src="./js/app.js"></script>
</body>
</html>
